kind = "web"
previewPath = "/"
title = "ProjTrack"
version = "1.0.0"
id = "artifacts/projtrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23050

[services.development]
run = "pnpm --filter @workspace/projtrack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/projtrack", "run", "build" ]
publicDir = "artifacts/projtrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23050"
BASE_PATH = "/"
