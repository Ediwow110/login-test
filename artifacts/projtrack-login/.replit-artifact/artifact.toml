kind = "web"
previewPath = "/"
title = "ProjTrack Login"
version = "1.0.0"
id = "artifacts/projtrack-login"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22733

[services.development]
run = "pnpm --filter @workspace/projtrack-login run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/projtrack-login", "run", "build" ]
publicDir = "artifacts/projtrack-login/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22733"
BASE_PATH = "/"
